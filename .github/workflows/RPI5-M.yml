name: RPI5 BULDER MODEM

on:
  workflow_dispatch:
    inputs:
      upload_release:
        description: "Upload firmware to GitHub Release?"
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

      add_bcm:
        description: "Add Extra Config PI5?"
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

      add_modem:
        description: "Add USB 4G/5G modem support?"
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

      default_ip_mode:
        description: "Default IP mode"
        required: true
        default: "keep_default"
        type: choice
        options:
          - "keep_default"
          - "custom"

      default_ip:
        description: "Custom LAN IP"
        required: false
        default: "10.10.1.1"

permissions:
  contents: write

jobs:
  build:
    name: Build RPI5 Firmware
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Add extra swap
        run: |
          sudo fallocate -l 8G /swapfile2 || sudo dd if=/dev/zero of=/swapfile2 bs=1M count=8192
          sudo chmod 600 /swapfile2
          sudo mkswap /swapfile2
          sudo swapon /swapfile2 || true
          free -h

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          sudo docker image prune -a -f || true
          sudo apt-get clean
          df -hT

      - name: Install build dependencies
        run: |
          sudo apt update -y
          sudo apt install -y \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses-dev libssl-dev python3 rsync unzip zlib1g-dev \
            file wget curl

      - name: Clean old build files
        run: |
          rm -rf dl build_dir staging_dir tmp .ccache

      - name: Prepare feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Set LAN IP mode
        run: |
          MODE="${{ github.event.inputs.default_ip_mode }}"
          IP="${{ github.event.inputs.default_ip }}"
          FILE="package/base-files/files/bin/config_generate"

          [ -z "$IP" ] && IP="10.10.1.1"

          echo "LAN IP mode: $MODE"

          if [ "$MODE" = "custom" ]; then
            echo "Using custom LAN IP: $IP"
            sed -i "s|192\.168\.1\.1|$IP|g" "$FILE"
          else
            echo "Keeping original OpenWrt LAN IP: 192.168.1.1"
          fi

          echo "Checking config_generate:"
          grep -n "lan) ipad=" "$FILE" || true
          grep -n "192.168.1.1" "$FILE" || true
          grep -n "$IP" "$FILE" || true

      - name: Disable Rust CI LLVM download
        run: |
          sed -i 's/llvm\.download-ci-llvm=true/llvm.download-ci-llvm=false/g' feeds/packages/lang/rust/Makefile
          grep -n "llvm.download-ci-llvm" feeds/packages/lang/rust/Makefile || true

      - name: Load RPI5 config
        run: |
          cp RPI5.config .config

      - name: Load Extra PI5 config
        if: ${{ github.event.inputs.add_bcm == 'true' }}
        run: |
          cat BCM >> .config

      - name: Add USB 4G/5G modem config
        if: ${{ github.event.inputs.add_modem == 'true' }}
        run: |
          add_config_y() {
            PKG="$1"

            if grep -q "^${PKG}=y" .config; then
              echo "${PKG} already set to y"
            elif grep -q "^${PKG}=m" .config; then
              echo "Changing ${PKG}=m to ${PKG}=y"
              sed -i "s|^${PKG}=m|${PKG}=y|g" .config
            elif grep -q "^# ${PKG} is not set" .config; then
              echo "Changing # ${PKG} is not set to ${PKG}=y"
              sed -i "s|^# ${PKG} is not set|${PKG}=y|g" .config
            else
              echo "Adding ${PKG}=y"
              echo "${PKG}=y" >> .config
            fi
          }

          echo "" >> .config
          echo "# USB 4G/5G modem support - No MHI" >> .config

          add_config_y CONFIG_PACKAGE_kmod-usb-core
          add_config_y CONFIG_PACKAGE_kmod-usb2
          add_config_y CONFIG_PACKAGE_kmod-usb3

          add_config_y CONFIG_PACKAGE_kmod-usb-net
          add_config_y CONFIG_PACKAGE_kmod-usb-net-cdc-ether
          add_config_y CONFIG_PACKAGE_kmod-usb-net-qmi-wwan
          add_config_y CONFIG_PACKAGE_kmod-usb-net-cdc-mbim
          add_config_y CONFIG_PACKAGE_kmod-usb-net-cdc-ncm
          add_config_y CONFIG_PACKAGE_kmod-usb-net-huawei-cdc-ncm
          add_config_y CONFIG_PACKAGE_kmod-usb-net-rndis

          add_config_y CONFIG_PACKAGE_kmod-usb-serial
          add_config_y CONFIG_PACKAGE_kmod-usb-serial-option
          add_config_y CONFIG_PACKAGE_kmod-usb-serial-wwan
          add_config_y CONFIG_PACKAGE_kmod-usb-acm

          add_config_y CONFIG_PACKAGE_uqmi
          add_config_y CONFIG_PACKAGE_umbim
          add_config_y CONFIG_PACKAGE_luci-proto-qmi
          add_config_y CONFIG_PACKAGE_luci-proto-mbim

          add_config_y CONFIG_PACKAGE_picocom
          add_config_y CONFIG_PACKAGE_usbutils
          add_config_y CONFIG_PACKAGE_pciutils

          echo "Checking modem config:"
          grep -E "CONFIG_PACKAGE_(kmod-usb|uqmi|umbim|luci-proto-qmi|luci-proto-mbim|picocom|usbutils|pciutils)" .config || true

      - name: Build RPI5 firmware
        run: |
          make defconfig
          make download -j6 || make download -j1 V=s
          make -j$(nproc) || make -j1 V=s

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: RPI5-Firmware-Bin
          path: bin/
          if-no-files-found: error
          retention-days: 7

      - name: Generate release tag
        if: ${{ github.event.inputs.upload_release == 'true' }}
        id: tag
        run: |
          echo "tag=RPI5-Firmware-$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Create GitHub release and upload firmware
        if: ${{ github.event.inputs.upload_release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: RPI5 ImmortalWrt Firmware ${{ steps.tag.outputs.tag }}
          body: |
            Auto build firmware for Raspberry Pi 5.

            LAN IP mode:
            ${{ github.event.inputs.default_ip_mode }}

            Custom LAN IP:
            ${{ github.event.inputs.default_ip }}

            USB 4G/5G modem support:
            ${{ github.event.inputs.add_modem }}

            MHI support:
            Disabled / not included

            Original OpenWrt LAN IP:
            192.168.1.1

            Target:
            bcm27xx/bcm2712/rpi-5

            Build tag:
            ${{ steps.tag.outputs.tag }}
          files: |
            bin/targets/bcm27xx/bcm2712/config.buildinfo
            bin/targets/bcm27xx/bcm2712/feeds.buildinfo
            bin/targets/bcm27xx/bcm2712/immortalwrt-bcm27xx-bcm2712-rpi-5-ext4-factory.img.gz
            bin/targets/bcm27xx/bcm2712/immortalwrt-bcm27xx-bcm2712-rpi-5-ext4-sysupgrade.img.gz
            bin/targets/bcm27xx/bcm2712/immortalwrt-bcm27xx-bcm2712-rpi-5.manifest
            bin/targets/bcm27xx/bcm2712/immortalwrt-bcm27xx-bcm2712-rpi-5-squashfs-factory.img.gz
            bin/targets/bcm27xx/bcm2712/immortalwrt-bcm27xx-bcm2712-rpi-5-squashfs-sysupgrade.img.gz
            bin/targets/bcm27xx/bcm2712/profiles.json
            bin/targets/bcm27xx/bcm2712/sha256sums
            bin/targets/bcm27xx/bcm2712/version.buildinfo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
